<article class="card">
  <a href="{{ include.post.url | relative_url }}" class="card-link">
    {% if include.post.featured_image %}
      <img src="{{ include.post.featured_image | relative_url }}" alt="{{ include.post.title }}" loading="lazy" width="600" height="400">
    {% endif %}
    <div class="card-body">
      <h3>{{ include.post.title }}</h3>
      <p>{{ include.post.intro | default: include.post.excerpt | strip_html | truncate: 120 }}</p>
      {% if include.post.category %}
        <span class="tag">{{ include.post.category }}</span>
      {% endif %}
    </div>
  </a>
</article>
