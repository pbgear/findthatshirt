backend:
  name: github
  repo: pbgear/findthatshirt
  branch: main
  # Optional but often helpful for auth routing:
  site_domain: pbgear.github.io

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

site_url: https://pbgear.github.io/findthatshirt
display_url: https://pbgear.github.io/findthatshirt

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "Meta Description", name: "meta_description", widget: "text" }
      - { label: "Slug", name: "slug", widget: "string", hint: "example: best-valentines-day-tshirts" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Holiday Shirts", "TV Shirts", "Funny Shirts", "Graphic Tees", "Costume Shirts"]
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Featured Image", name: "featured_image", widget: "image" }
      - label: "Gallery Images"
        name: "gallery_images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - label: "Affiliate Links"
        name: "affiliate_links"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string", required: false }
          - { label: "Button Text", name: "button_text", widget: "string", default: "Check Price" }
          - { label: "Button URL", name: "url", widget: "string" }
      - { label: "Button Text", name: "button_text", widget: "string", required: false, default: "Check Price on Amazon" }
      - { label: "Button URL", name: "button_url", widget: "string", required: false }
      - { label: "Short Intro", name: "intro", widget: "text", required: false }
      - { label: "Post Content (Markdown)", name: "body", widget: "markdown" }
