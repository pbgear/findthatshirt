---
layout: default
---

<section>
  <h1>{{ page.title }}</h1>
  <p>{{ page.description }}</p>
</section>

<div class="card-grid">
  {% assign category_posts = site.categories[page.category_key] %}
  {% for post in category_posts %}
    {% include post-card.html post=post %}
  {% else %}
    <p>No posts yet in this category.</p>
  {% endfor %}
</div>
